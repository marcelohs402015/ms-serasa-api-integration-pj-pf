                timestamp: "2026-04-09T16:03:49.676000000Z"
        '500':
          description: Erro interno ou erro de integracao Serasa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serasa_document_not_found:
                  value:
                    code: SERASA_REPORT_ERROR
                    message: "Falha ao consultar relatorio na Serasa: [{\"code\":\"404\",\"message\":\"[ERROR][DOCUMENT_NOT_FOUND] Documento nao encontrado na Serasa Experian.\"}]"
                    timestamp: "2026-04-09T16:11:40.436190200Z"
components:
  schemas:
    TipoConsulta:
      type: string
      enum:
        - PF
        - PJ
    TokenRequest:
      type: object
      required:
        - tipo
      properties:
        tipo:
          $ref: '#/components/schemas/TipoConsulta'
    TokenResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
        - expiresAt
        - context
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
        context:
          $ref: '#/components/schemas/TipoConsulta'
    ConsultaRequest:
      type: object
      required:
        - tipo
        - documento
        - features
      properties:
        tipo:
          $ref: '#/components/schemas/TipoConsulta'
        documento:
          type: string
          description: CPF (PF) ou CNPJ (PJ), sem mascara.
          example: "03994975000170"
        features:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ReportFeature'
          description: >
            Lista de opcoes de emissao de relatorio.
            Consulte as listas separadas em ReportFeaturePf e ReportFeaturePj para escopo especifico.
    ReportFeature:
      type: string
      enum:
        - DADOS_CADASTRAIS
        - QSA
        - QSA_COMPLETO
        - CONSULTAS_A_SERASA
