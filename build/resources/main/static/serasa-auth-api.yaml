openapi: 3.0.3
info:
  title: ms-serasa-api
  version: 2.0.0
  description: >
    API interna para autenticacao e consulta de relatorios Serasa PF/PJ.
    Endpoint interno de consulta e POST, enquanto a integracao externa para PF/PJ usa GET com headers e reportName.
paths:
  /v1/serasa/token:
    post:
      tags:
        - serasa-auth
      operationId: generateSerasaToken
      summary: Gera token de acesso Serasa (contexto PF ou PJ)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            examples:
              pf:
                value:
                  tipo: PF
              pj:
                value:
                  tipo: PJ
      responses:
        '200':
          description: Token gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/serasa/consultas:
    post:
      tags:
        - serasa-relatorios
      operationId: consultarRelatorioSerasa
      summary: Consulta relatorio Serasa PF ou PJ
      description: >
        Endpoint unico da API interna.
        - PF externo: GET /credit-services/person-information-report/v1/creditreport
        - PJ externo: GET /credit-services/business-information-report/v1/reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaRequest'
            examples:
              pf_top_score:
                summary: Consulta PF top score
                value:
                  tipo: PF
                  documento: "00047668148"
                  features:
                    - DADOS_CADASTRAIS
                    - CONSULTAS_A_SERASA
              pj_top_score:
                summary: Consulta PJ top score
                value:
                  tipo: PJ
                  documento: "03994975000170"
                  features:
                    - DADOS_CADASTRAIS
                    - QSA
                    - SCORE_POSITIVO
      responses:
        '200':
          description: Relatorio retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaResponse'
              examples:
                pf_success:
                  summary: Exemplo de retorno 200 para consulta PF
                  value:
                    reports:
                      - reportName: RELATORIO_INTERMEDIARIO_TOP_SCORE_PF
                        registration:
                          documentNumber: "00047668148"
